      component_type: web-ui
      style: "rounded=1;whiteSpace=wrap;html=1;align=center;imageAlign=center;imageWidth=82;imageHeight=82;arcSize=90;absoluteArcSize=1;strokeColor=#20C9E3;fillColor=#E3FCFC;fontColor=#0084AD;fontSize=12;source=iriusrisk;ir.type=COMPONENT;ir.componentDefinition.ref=web-ui;verticalLabelPosition=bottom;verticalAlign=top;ir.synchronized=0;strokeWidth=1;"
