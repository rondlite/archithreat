# Default mapping for the drawio-iriusrisk target.
#
# Style strings, trust-zone UUIDs, and ir.componentDefinition.ref values are
# all extracted from IriusRisk's public Community shape libraries:
#
#   https://github.com/iriusrisk/Community/tree/master/ShapeLibraries
#
# Coverage:
#   - 6 trust zones (Internet, Public, Public Cloud, Private Secured,
#       Trusted Partner, Third Party / SaaS)
#   - 593 component definitions across 27 libraries (AWS, Azure, GCP, OCI,
#       Kubernetes, Docker, Server-side, Client-side, Network, Hardware,
#       SAP, Generic, Functional, Regulatory, IoT, etc.)
#
# This mapping uses canonical community refs (e.g. `web-ui`, `postgresql`,
# `CD-NGINX`). If your IriusRisk installation uses a customised library
# (e.g. with a `CD-V2-*` prefix), copy this file, replace the refs, and
# pass `--mapping path/to/your.yaml`.
#
# Edges DO NOT carry ir.assets / ir.tags by default — those are user-added
# in IriusRisk's editor after import. v1.1 will template them from
# per-relationship properties (protocol, port, encryption, authentication).

version: 1
target: drawio-iriusrisk

zone_rules:
  # Internet
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(internet|public[- ]?facing)\b'
