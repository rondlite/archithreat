connection_rules:
  # IriusRisk data-flow visual: curved gray edge, thin open arrowhead.
  # ir.assets / ir.tags are user-added in IriusRisk after import.
  - match:
      archimate_type: Flow
    iriusrisk:
      style: "edgeStyle=none;curved=1;html=1;strokeColor=#BFBFBF;strokeWidth=2;endArrow=open;endFill=0;endSize=4;"
      direction: source_to_target
  - match:
      archimate_type: Serving
    iriusrisk:
      style: "edgeStyle=none;curved=1;html=1;strokeColor=#BFBFBF;strokeWidth=2;endArrow=open;endFill=0;endSize=4;"
      direction: target_to_source
  - match:
      archimate_type: Access
    iriusrisk:
      style: "edgeStyle=none;curved=1;html=1;strokeColor=#BFBFBF;strokeWidth=2;endArrow=open;endFill=0;endSize=4;dashed=1;"
      direction: by_access_type
  - match:
      archimate_type: UsedBy
    iriusrisk:
      style: "edgeStyle=none;curved=1;html=1;strokeColor=#BFBFBF;strokeWidth=2;endArrow=open;endFill=0;endSize=4;"
      direction: target_to_source
  - match:
      archimate_type: Triggering
    iriusrisk:
      style: "edgeStyle=none;curved=1;html=1;strokeColor=#BFBFBF;strokeWidth=2;endArrow=open;endFill=0;endSize=4;"
      direction: source_to_target

property_passthrough:
  components:
    - protocol
    - data_classification
    - patch_authority
    - tech_stack
  connections:
    - protocol
    - port
    - authentication
    - encryption

defaults:
  unmatched_element: skip_with_warning
  unmatched_relationship: skip_with_warning
