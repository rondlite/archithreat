# Default mapping for the iriusrisk target (draw.io / mxGraph for IriusRisk).
#
# Component refs and trust-zone UUIDs target the IriusRisk CD-V2-* shape
# library that ships in current Community and Enterprise installations
# (regenerated against a live IriusRisk REST API; see
# scripts/regen_iriusrisk_defaults.py for the pipeline).
#
# Coverage:
#   - 6 standard trust zones (Internet, Public, Public Cloud, Private
#       Secured, Trusted Partner, Third Party / SaaS), plus name-pattern
#       rules for common deployment-typical names (DMZ, Internal, Backend,
#       Production, Payment, Vendor, Workplace, etc.) so they bind to the
#       right standard zone instead of falling through to the catch-all.
#   - 118 component rules covering AWS, Azure, GCP, OCI, Kubernetes,
#       Docker, databases, identity, web servers, network, messaging,
#       SaaS, and generic shapes.
#
# If your IriusRisk installation ships a different library namespace,
# regenerate this file via:
#
#   IRIUSRISK_BASE_URL=<url> IRIUSRISK_TOKEN=<token> \
#       python scripts/regen_iriusrisk_defaults.py
#
# Or copy this file, override the refs by hand, and pass it via
# `--mapping path/to/your.yaml`.
#
# Edges DO NOT carry ir.assets / ir.tags by default — those are user-added
# in IriusRisk's editor after import. v1.1 will template them from
# per-relationship properties (protocol, port, encryption, authentication).

version: 1
target: iriusrisk

zone_rules:
  # Internet
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(internet|public[- ]?facing)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=f0ba7722-39b6-4c81-8290-a30a248bb8d9;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\b(internet|public[- ]?facing)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=f0ba7722-39b6-4c81-8290-a30a248bb8d9;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Public Cloud
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\bpublic cloud\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=b61d6911-338d-46a8-9f39-8dcd24abfe91;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\bpublic cloud\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=b61d6911-338d-46a8-9f39-8dcd24abfe91;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Public
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\bpublic\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=6376d53e-6461-412b-8e04-7b3fe2b397de;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\bpublic\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=6376d53e-6461-412b-8e04-7b3fe2b397de;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Third Party / SaaS
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(third[- ]?party|saas|vendor)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=942c6a50-3944-4e81-ae90-003f3d173aac;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\b(third[- ]?party|saas|vendor)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=942c6a50-3944-4e81-ae90-003f3d173aac;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Trusted Partner
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(trusted partner|partner)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=531315a7-41a2-40ed-ab87-22c3a4c3c7ff;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\b(trusted partner|partner)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=531315a7-41a2-40ed-ab87-22c3a4c3c7ff;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # DMZ — perimeter / public-facing edge → Public
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(dmz|perimeter|edge)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=6376d53e-6461-412b-8e04-7b3fe2b397de;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\b(dmz|perimeter|edge)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=6376d53e-6461-412b-8e04-7b3fe2b397de;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Internal / backend / production / corporate → Private Secured
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(private[- ]?secured|internal|intranet|backend|back[- ]?office|backoffice|production|prod|corporate|on[- ]?prem|on[- ]?premise|workplace|office|warehouse|shop[- ]?floor|factory|plant)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=2ab4effa-40b7-4cd2-ba81-8247d29a6f2d;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\b(private[- ]?secured|internal|intranet|backend|back[- ]?office|backoffice|production|prod|corporate|on[- ]?prem|on[- ]?premise|workplace|office|warehouse|shop[- ]?floor|factory|plant)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=2ab4effa-40b7-4cd2-ba81-8247d29a6f2d;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Payment / billing / finance / external trusted vendor → Trusted Partner
  - match:
      archimate_type: Grouping
      name_pattern: '(?i)\b(payment|billing|finance|vendor|gateway|provider)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=531315a7-41a2-40ed-ab87-22c3a4c3c7ff;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
      name_pattern: '(?i)\b(payment|billing|finance|vendor|gateway|provider)\b'
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=531315a7-41a2-40ed-ab87-22c3a4c3c7ff;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  # Fallback — unidentified zones classify as Internet per threat-modeling
  # convention (an unknown trust boundary is, by default, untrusted). The
  # resolver emits a `zone_name_unrecognized` warning whenever this rule
  # fires so modelers see the fallback rather than silently shipping
  # mislabeled zones. Override by adding a name-patterned rule above this
  # one with the `ir.ref` for your installation's library zone.
  - match:
      archimate_type: Grouping
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=f0ba7722-39b6-4c81-8290-a30a248bb8d9;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"
  - match:
      archimate_type: Location
    iriusrisk:
      zone_name_property: name
      style: "ir.ref=f0ba7722-39b6-4c81-8290-a30a248bb8d9;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"

synthetic_zones:
