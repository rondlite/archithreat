      style: "rounded=1;whiteSpace=wrap;html=1;align=center;imageAlign=center;imageWidth=82;imageHeight=82;arcSize=90;absoluteArcSize=1;strokeColor=#20C9E3;fillColor=#E3FCFC;fontColor=#0084AD;fontSize=12;source=iriusrisk;ir.type=COMPONENT;ir.componentDefinition.ref=CD-V2-LDAP-DIRECTORY;verticalLabelPosition=bottom;verticalAlign=top;ir.synchronized=0;strokeWidth=1;"
  # DataObject — name match → file-system
  - match:
      archimate_type: DataObject
      name_pattern: '(?i)\b(file system|filesystem|files?)\b'
    iriusrisk:
      component_type: CD-V2-FILE-SYSTEM
      style: "rounded=1;whiteSpace=wrap;html=1;align=center;imageAlign=center;imageWidth=82;imageHeight=82;arcSize=90;absoluteArcSize=1;strokeColor=#20C9E3;fillColor=#E3FCFC;fontColor=#0084AD;fontSize=12;source=iriusrisk;ir.type=COMPONENT;ir.componentDefinition.ref=CD-V2-FILE-SYSTEM;verticalLabelPosition=bottom;verticalAlign=top;ir.synchronized=0;strokeWidth=1;"
  # DataObject — name match → cloud-storage
  - match:
      archimate_type: DataObject
      name_pattern: '(?i)\b(blob|object storage|s3)\b'
    iriusrisk:
      component_type: CD-V2-CLOUD-STORAGE
      style: "rounded=1;whiteSpace=wrap;html=1;align=center;imageAlign=center;imageWidth=82;imageHeight=82;arcSize=90;absoluteArcSize=1;strokeColor=#20C9E3;fillColor=#E3FCFC;fontColor=#0084AD;fontSize=12;source=iriusrisk;ir.type=COMPONENT;ir.componentDefinition.ref=CD-V2-CLOUD-STORAGE;verticalLabelPosition=bottom;verticalAlign=top;ir.synchronized=0;strokeWidth=1;"
