  external:
    name: "Internet"
    style: "ir.ref=f0ba7722-39b6-4c81-8290-a30a248bb8d9;rounded=1;whiteSpace=wrap;recursiveResize=0;html=1;verticalAlign=top;align=left;dashed=1;strokeWidth=1;arcSize=3;absoluteArcSize=1;spacingTop=1;spacingLeft=32;strokeColor=#7575EB;fillColor=#F0F0FF;fillOpacity=30;fontColor=#5651E0;connectable=0;container=1;source=iriusrisk;ir.type=TRUSTZONE;"

component_rules:
  # tech_stack=web → Web UI
  - match:
      archimate_type: ApplicationComponent
      property:
        name: tech_stack
        equals: web
    iriusrisk:
      component_type: CD-V2-WEB-UI
      style: "rounded=1;whiteSpace=wrap;html=1;align=center;imageAlign=center;imageWidth=82;imageHeight=82;arcSize=90;absoluteArcSize=1;strokeColor=#20C9E3;fillColor=#E3FCFC;fontColor=#0084AD;fontSize=12;source=iriusrisk;ir.type=COMPONENT;ir.componentDefinition.ref=CD-V2-WEB-UI;verticalLabelPosition=bottom;verticalAlign=top;ir.synchronized=0;strokeWidth=1;"
  # tech_stack=mobile → Mobile
  - match:
      archimate_type: ApplicationComponent
      property:
        name: tech_stack
        equals: mobile
    iriusrisk:
      component_type: CD-V2-MOBILE-DEVICE-CLIENT
