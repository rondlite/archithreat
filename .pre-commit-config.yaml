# Pre-commit hooks for archithreat.
#
# Install:   pip install pre-commit && pre-commit install
# Run all:   pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy runs against the project's installed environment so it sees the
  # same dep set CI uses (pydantic plugin, lxml-stubs, etc.). Project-local
  # rather than pre-commit's hermetic `mypy` mirror, by intent.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (project)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
