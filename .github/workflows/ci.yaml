name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref. Keeps PR feedback snappy and
# avoids burning CI minutes on stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-type:
    name: lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cli,web,dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy
        run: mypy

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cli,web,dev]"

      - name: pytest with coverage
        run: |
          pytest -q \
            --cov=src/archithreat/core \
            --cov-report=xml \
            -m "not browser"

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  validate-mapping-yaml:
    name: validate mapping YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (cli extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[cli]"

      - name: Validate examples/*.yaml (if any)
        shell: bash
        run: |
          shopt -s nullglob
          yaml_files=(examples/*.yaml examples/*.yml)
          if [ ${#yaml_files[@]} -eq 0 ]; then
            echo "No YAML examples present — skipping."
            exit 0
          fi
          for f in "${yaml_files[@]}"; do
            echo "Validating $f"
            archithreat validate-mapping "$f"
          done

      - name: Round-trip the bundled default mapping
        shell: bash
        run: |
          tmp="$(mktemp --suffix=.yaml)"
          archithreat show-defaults > "$tmp"
          archithreat validate-mapping "$tmp"
